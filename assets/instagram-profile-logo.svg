<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" fill="none">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="37%" r="42%" fx="50%" fy="37%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0.22" />
      <stop offset="45%" stop-color="#D4A843" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="55%" stop-color="#0D2818" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.28" />
    </radialGradient>
    <filter id="heartGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0D2818" />

  <!-- Subtle radial gold glow behind infinity -->
  <rect width="1080" height="1080" fill="url(#centerGlow)" />

  <!-- Premium edge vignette -->
  <rect width="1080" height="1080" fill="url(#vignette)" />

  <!-- Infinity mark group  scaled brand geometry, vertically centered upper -->
  <g transform="translate(540 395) scale(6.2) translate(-50 -50)" filter="url(#heartGlow)">
    <!-- Top heart  sage -->
    <path
      d="M 50 50 C 50 50, 31.67 41.67, 26.67 31.67 C 21.67 21.67, 26.67 15, 35 15 C 43.33 15, 50 25, 50 31.67"
      stroke="#8FAF95"
      stroke-width="4.8"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 50 31.67 C 50 25, 56.67 15, 65 15 C 73.33 15, 78.33 21.67, 73.33 31.67 C 68.33 41.67, 50 50, 50 50"
      stroke="#8FAF95"
      stroke-width="4.8"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Bottom heart  antique gold -->
    <path
      d="M 50 50 C 50 50, 31.67 58.33, 26.67 68.33 C 21.67 78.33, 26.67 85, 35 85 C 43.33 85, 50 75, 50 68.33"
      stroke="#D4A843"
      stroke-width="4.8"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M 50 68.33 C 50 75, 56.67 85, 65 85 C 73.33 85, 78.33 78.33, 73.33 68.33 C 68.33 58.33, 50 50, 50 50"
      stroke="#D4A843"
      stroke-width="4.8"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Three-layer centre meeting point -->
    <circle cx="50" cy="50" r="12.5" fill="none" stroke="#D4A843" stroke-opacity="0.3" stroke-width="2.2" />
    <circle cx="50" cy="50" r="8.2" fill="#0D2818" stroke="#D4A843" stroke-width="1.6" />
    <circle cx="50" cy="50" r="3.4" fill="#D4A843" />
  </g>

  <!-- Wordmark -->
  <text
    x="540"
    y="668"
    text-anchor="middle"
    fill="#F5EFE6"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92"
    font-weight="700"
    letter-spacing="-1.5"
    filter="url(#textShadow)"
  >
    GenoMatch
  </text>

  <!-- Tagline -->
  <text
    x="540"
    y="738"
    text-anchor="middle"
    fill="#8FAF95"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="400"
    letter-spacing="0.6"
  >
    Connecting Hearts. Aligning Genes.
  </text>

  <!-- Subtle ceremony line above wordmark -->
  <line
    x1="340"
    y1="612"
    x2="740"
    y2="612"
    stroke="#D4A843"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.45"
  />

  <!-- Gold border  full square -->
  <rect
    x="1.5"
    y="1.5"
    width="1077"
    height="1077"
    fill="none"
    stroke="#D4A843"
    stroke-width="3"
  />
</svg>
